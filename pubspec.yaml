name: flutter_key_value_file_storage
description: An implementation to save big chunks of content to a file
version: 0.1.1
homepage: https://github.com/icapps/flutter_key_value_file_storage

environment:
  sdk: ">=3.8.0 <4.0.0"
  flutter: ">=3.38.0"

dependencies:
  device_info_plus: ^12.3.0
  flutter:
    sdk: flutter
  flutter_secure_storage: ^10.0.0
  path: ^1.9.1
  path_provider: ^2.1.5
  synchronized: ^3.4.0

dev_dependencies:
  build_runner: ^2.12.2
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.6.3

flutter:
  plugin:
    platforms:
      android:
        package: com.icapps.flutter_key_value_file_storage
        pluginClass: FlutterKeyValueFileStoragePlugin
      ios:
        pluginClass: FlutterKeyValueFileStoragePlugin
